x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "8_yM9G0yXK9C6jTQJr3Gv3eW3o6lGqzj7Vw8m8p5Vq0="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    # ---- LOGGING FIX ----
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: "8793"
    AIRFLOW__LOGGING__HOSTNAME_TEMPLATE: "{{ ti.hostname }}"
    AIRFLOW__WEBSERVER__BASE_URL: "http://localhost:8080"

  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./logs:/opt/airflow/logs
  depends_on:
    - postgres
    - minio

services:
  postgres:
    image: postgres:16
    container_name: p2_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - ./sql/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro

  minio:
    image: minio/minio:latest
    container_name: p2_minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data

  airflow-init:
    <<: *airflow-common
    container_name: p2_airflow_init
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname Akarsh --lastname Thota --role Admin --email admin@example.com || true"

  airflow-webserver:
    <<: *airflow-common
    container_name: p2_airflow_web
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: p2_airflow_sched
    command: scheduler

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: p2_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"